<section class="review-page">

  <div class="review-page__content">

    <div class="review-page__header">
      <h1 class="review-page__heading gradient-text">Review your profile</h1>
      <p class="review-page__subheading">Here's how we will set up the content on your homepage for you:</p>
    </div>

    <div class="review-page__body">

      <!-- AI summary card -->
      <div class="review-page__card-outer">
        <div class="review-page__card-inner">

          <!-- Card header row -->
          <div class="review-page__card-header">
            <div class="review-page__card-title">
              <img [src]="sparklesUrl" alt="" aria-hidden="true" width="24" height="24" />
              <span class="review-page__summary-label">Summary</span>
            </div>
            <div class="review-page__card-actions">
              <button class="link-btn" type="button" (click)="undo()">
                <img [src]="undoIconUrl" alt="" aria-hidden="true" width="18" height="24" />
                Undo
              </button>
              <button class="pill-btn pill-btn--sm" type="button" (click)="regenerate()">
                <img [src]="wandUrl" alt="" aria-hidden="true" width="16" height="16" />
                <span>Regenerate</span>
              </button>
            </div>
          </div>

          <!-- Summary text -->
          <p class="review-page__summary-text">{{ summary }}</p>

          <hr class="review-page__divider" />

          <!-- Tags -->
          <div class="review-page__chips">
            @for (chip of chips; track chip) {
              <adb-chip [label]="chip" color="default" />
            }
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- CTA -->
  <div class="review-page__actions">
    <button class="pill-btn" type="button" (click)="next()">
      <span>Next</span>
      <img [src]="arrowRightUrl" alt="" aria-hidden="true" width="24" height="24" />
    </button>
  </div>

</section>
