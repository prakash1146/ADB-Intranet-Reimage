<section class="ready-page">

  <!-- Concentric circles + avatar + floating tags -->
  <div class="ready-page__visual" aria-hidden="true">
    <img class="ready-page__circles" [src]="circlesUrl" alt="" />

    <div class="ready-page__avatar-wrap">
      <img class="ready-page__avatar" [src]="avatarUrl" alt="" />
    </div>

    @for (tag of tags; track tag.label) {
      <div
        class="ready-page__tag"
        [style.top]="tag.top"
        [style.left]="tag.left"
        [style.opacity]="tag.opacity"
      >
        {{ tag.label }}
      </div>
    }
  </div>

  <!-- Copy -->
  <div class="ready-page__copy">
    <h1 class="ready-page__heading gradient-text">Your homepage is ready.</h1>
    <p class="ready-page__subheading">Everything is personalised and waiting for you.</p>
  </div>

  <!-- CTA -->
  <button class="pill-btn" type="button" (click)="startNow()">
    <span>Start Now</span>
    <img [src]="arrowRightUrl" alt="" aria-hidden="true" width="24" height="24" />
  </button>

</section>
